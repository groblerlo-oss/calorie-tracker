<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Calorie Tracker Pro</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-subtitle {
            font-size: 12px;
            opacity: 0.8;
        }
        .activity-log {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .activity-log h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .activity-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .activity-item.register {
            border-left-color: #4caf50;
        }
        .activity-item.login {
            border-left-color: #2196f3;
        }
        .activity-email {
            font-weight: bold;
            color: #333;
        }
        .activity-time {
            color: #666;
            font-size: 13px;
        }
        .activity-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .activity-badge.register {
            background: #4caf50;
        }
        .activity-badge.login {
            background: #2196f3;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #667eea;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        .refresh-btn:hover {
            background: #5568d3;
        }
        .back-btn {
            background: #999;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="back-btn" onclick="window.close()">← Back to App</button>

    <h1>👨‍💼 Admin Dashboard</h1>

    <div id="loading" class="loading">
        <div>Loading data...</div>
        <div style="margin-top:10px;">🔄</div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-subtitle">Registered accounts</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Today's Registrations</div>
                <div class="stat-value" id="todayRegistrations">0</div>
                <div class="stat-subtitle">New users today</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Today's Logins</div>
                <div class="stat-value" id="todayLogins">0</div>
                <div class="stat-subtitle">Active users today</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">This Week</div>
                <div class="stat-value" id="weekRegistrations">0</div>
                <div class="stat-subtitle">New users this week</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadAdminData()">🔄 Refresh Data</button>

        <div class="activity-log">
            <h2>📋 Recent Activity (Last 50 Events)</h2>
            <div id="activityList"></div>
        </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>
</div>

<script>
    // ============================================
    // FIREBASE CONFIGURATION (Same as main app)
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyCRcR_avSGTnn4G69FUk8wcshrVHZNrj5o",
        authDomain: "calorie-app-67270.firebaseapp.com",
        projectId: "calorie-app-67270",
        storageBucket: "calorie-app-67270.firebasestorage.app",
        messagingSenderId: "768480441035",
        appId: "1:768480441035:web:ed34093e220ace6c13614e"
    };

    // Initialize Firebase
    let app, auth, db;

    try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        console.log('Firebase initialized');
    } catch(error) {
        console.error('Firebase init error:', error);
        document.getElementById('loading').innerHTML = '<div class="error-msg">Firebase initialization failed</div>';
    }

    // ============================================
    // ADMIN FUNCTIONS
    // ============================================

    function loadAdminData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';

        // Get all tracking events
        db.collection('admin_tracking')
            .orderBy('timestamp', 'desc')
            .limit(50)
            .get()
            .then((querySnapshot) => {
                const events = [];
                querySnapshot.forEach((doc) => {
                    events.push({ id: doc.id, ...doc.data() });
                });

                calculateStats(events);
                displayActivity(events);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            })
            .catch((error) => {
                console.error('Error loading admin data:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Error loading data: ' + error.message;
            });
    }

    function calculateStats(events) {
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

        let todayRegistrations = 0;
        let todayLogins = 0;
        let weekRegistrations = 0;
        const uniqueUsers = new Set();

        events.forEach(event => {
            const eventDate = event.timestamp.split('T')[0];
            const eventTime = new Date(event.timestamp);

            if (event.event === 'user_registered') {
                if (eventDate === today) todayRegistrations++;
                if (eventTime >= weekAgo) weekRegistrations++;
            }

            if (event.event === 'user_login' && eventDate === today) {
                todayLogins++;
            }

            if (event.userId) {
                uniqueUsers.add(event.userId);
            }
        });

        document.getElementById('totalUsers').textContent = uniqueUsers.size;
        document.getElementById('todayRegistrations').textContent = todayRegistrations;
        document.getElementById('todayLogins').textContent = todayLogins;
        document.getElementById('weekRegistrations').textContent = weekRegistrations;
    }

    function displayActivity(events) {
        const container = document.getElementById('activityList');

        if (events.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#999; padding:30px;">No activity yet</div>';
            return;
        }

        container.innerHTML = events.map(event => {
            const date = new Date(event.timestamp);
            const timeStr = date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const eventType = event.event === 'user_registered' ? 'register' : 'login';
            const eventLabel = event.event === 'user_registered' ? 'NEW USER' : 'LOGIN';
            const icon = event.event === 'user_registered' ? '🎉' : '🔓';

            return `
                <div class="activity-item ${eventType}">
                    <div>
                        <div>${icon} <span class="activity-email">${event.email}</span></div>
                        <div class="activity-time">${timeStr}</div>
                    </div>
                    <span class="activity-badge ${eventType}">${eventLabel}</span>
                </div>
            `;
        }).join('');
    }

    // Auto-refresh every 30 seconds
    setInterval(loadAdminData, 30000);

    // Load data when page opens
    setTimeout(loadAdminData, 1000);
</script>

</body>
</html>
